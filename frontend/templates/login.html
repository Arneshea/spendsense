<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSense — Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#6ee9e0",
            "primary-container": "#4ecdc4",
            "on-surface": "#e3e0f1",
            "on-surface-variant": "#bcc9c7",
            "surface": "#12121d",
            "surface-container": "#1f1e2a",
            "outline-variant": "#3d4948",
            "error": "#ffb4ab",
            "panel": "#1a1a2e",
            "border": "#2a2a45",
          },
          fontFamily: {
            "nav-item": ["Space Grotesk"],
            "headline-md": ["Space Grotesk"],
            "data-lg": ["JetBrains Mono"],
            "body-base": ["Space Grotesk"]
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f0f1a;
      font-family: 'Space Grotesk', sans-serif;
    }

    .glow {
      box-shadow: 0 0 40px rgba(78, 205, 196, 0.08);
    }
  </style>
</head>

<body
  class="bg-[#0f0f1a] text-on-surface font-body-base min-h-screen flex items-center justify-center px-4 overflow-hidden relative">

  <!-- Ambient background glow elements -->
  <div
    class="fixed top-[-20%] left-[-20%] w-[60%] h-[60%] rounded-full bg-[#4ECDC4]/5 blur-[120px] pointer-events-none">
  </div>
  <div
    class="fixed bottom-[-20%] right-[-20%] w-[60%] h-[60%] rounded-full bg-[#FF6B6B]/3 blur-[120px] pointer-events-none">
  </div>

  <div class="w-full max-w-sm relative z-10">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#4ECDC4]/10 text-[#4ECDC4] border border-[#4ECDC4]/20 mb-4 text-3xl">
        💸
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight font-headline-md">SpendSense</h1>
      <p class="text-[#4ECDC4] text-xs font-nav-item tracking-widest mt-1.5 uppercase">Smart Expense Leak Detector</p>
    </div>

    <!-- Card -->
    <div class="bg-panel rounded-2xl p-8 border border-border glow relative overflow-hidden">
      <!-- Top indicator line to match dashboard cards -->
      <div class="absolute top-0 left-0 right-0 h-[3px] bg-[#4ECDC4]"></div>

      <h2 class="text-xl font-semibold text-white mb-1 font-headline-md">Welcome back</h2>
      <p class="text-slate-400 text-sm mb-8">Sign in to track your spending leaks</p>

      <!-- Google OAuth Button -->
      <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-[#0a0a14] hover:bg-[#0f0f1a]
               text-[#e3e0f1] border border-[#2a2a45] hover:border-[#4ECDC4]/50 font-medium py-3 px-4 rounded-xl transition-all duration-200
               active:scale-95 shadow-md font-nav-item">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92
            c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77
            c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84
            C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09
            V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15
            C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84
            c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continue with Google
      </button>

      <p id="errorMsg" class="text-red-400 text-sm text-center mt-4 hidden font-nav-item"></p>

      <div class="mt-8 pt-6 border-t border-border text-center">
        <p class="text-slate-500 text-[11px] font-nav-item uppercase tracking-wider leading-relaxed">
          For JIIT AY 2025-26<br />
          Built by Arnesh Singh · Shelly Sinha · Himani Kumari
        </p>
      </div>
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "{{ supabase_url }}";
    const SUPABASE_ANON = "{{ supabase_anon_key }}";

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // If already logged in, go to dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = "/";
    });

    // Handle OAuth callback (hash fragment on redirect back)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_IN" && session) {
        localStorage.setItem("sb_access_token", session.access_token);
        localStorage.setItem("sb_refresh_token", session.refresh_token);
        window.location.href = "/";
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      const btn = document.getElementById("googleBtn");
      btn.disabled = true;
      btn.textContent = "Redirecting…";

      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "",
        },
      });

      if (error) {
        document.getElementById("errorMsg").textContent = error.message;
        document.getElementById("errorMsg").classList.remove("hidden");
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
      }
    });
  </script>
</body>

</html>
